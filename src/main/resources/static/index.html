<body style="background: linear-gradient(135deg, #667eea, #764ba2); min-height:100vh; display:flex; align-items:center; justify-content:center;">

<div class="container mt-5 text-center shadow p-3 rounded-4">

    <h2 style="font-family: 'Fira Code'">🔗 URL Shortener</h2>

    <input type="text" id="urlInput" class="form-control my-3 bg" placeholder="Enter URL here" />
    <br>
    <button class="btn btn-info" onclick="shortenUrl()">Shorten</button>

    <div id="result"  class="mt-3"></div>
</div>

<script>
    function shortenUrl() {
        const url = document.getElementById("urlInput").value;

        // Validate FIRST
        if (!url) {
            document.getElementById("result").innerHTML =
                "<span style='color:red;'>Please enter a URL</span>";
            return;
        }

        // Then call API
        fetch("http://localhost:8080/shorten", {
            method: "POST",
            headers: {
                "Content-Type": "text/plain"
            },
            body: url
        })
            .then(response => {
                if (!response.ok) {
                    return response.text().then(err => { throw new Error(err); });
                }
                return response.text();
            })
            .then(data => {
                document.getElementById("result").innerHTML =
                    `
                    <div class="bg-white border fw-bold text-info rounded-3">
                        <a href="${data}" target="_blank">${data}</a>
                        <button class="btn btn-sm btn-outline-dark" onclick="copyLink('${data}')">Copy</button>
                    </div>
        `;
            })
            .catch(error => {
                document.getElementById("result").innerHTML =
                    `<span style="color:red;">${error.message}</span>`;
            });
    }
    function copyLink(link) {
        navigator.clipboard.writeText(link);
        alert("Copied to clipboard!");
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
